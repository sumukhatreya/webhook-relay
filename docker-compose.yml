services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI → http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code            # hot reload in dev
      - /code/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker-routing:
    build: ./backend
    command: celery -A app.workers.celery_app worker -Q ingestion -c 4 -n routing@%h --loglevel=info
    env_file: ./backend/.env
    environment:
      - C_FORCE_ROOT=true
    volumes:
      - ./backend:/code
      - /code/.venv
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-delivery:
    build: ./backend
    command: celery -A app.workers.celery_app worker -Q delivery -c 4 -n delivery@%h --loglevel=info
    env_file: ./backend/.env
    environment:
      - C_FORCE_ROOT=true
    volumes:
      - ./backend:/code
      - /code/.venv
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build: ./backend
    command: celery -A app.workers.celery_app flower --port=5555
    env_file: ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq

volumes:
  pgdata:
  rabbitmqdata: